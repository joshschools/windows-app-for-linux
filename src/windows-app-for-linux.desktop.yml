app-id: io.github.joshschools.WindowsAppForLinux
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: windows-app-for-linux
finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  # GPU acceleration; --device=all is required for webcam access inside remote
  # desktop sessions (Flatpak has no finer-grained camera device permission).
  - --device=dri
  - --device=all
  # Scoped file access for remote-desktop file transfer (was --filesystem=home).
  - --filesystem=xdg-download
  - --filesystem=xdg-documents
  # NOTE: --talk-name=org.freedesktop.Flatpak was intentionally removed; it grants
  # host command execution (a sandbox escape) and is not needed by this app.

modules:
  - name: windows-app-for-linux
    buildsystem: simple
    # Reuses the node_modules produced by `npm ci` at the repo root (see CI),
    # then runs Electron's own bundled binary. This avoids apt/nodesource, which
    # cannot run inside the freedesktop SDK sandbox the way the old manifest tried.
    build-commands:
      - mkdir -p /app/windows-app-for-linux /app/bin
      - cp -r src/main.js src/settings-preload.js src/security.js src/config.js src/shortcuts.js src/recovery.js package.json node_modules /app/windows-app-for-linux/
      - |
        cat > /app/bin/windows-app-for-linux << 'EOF'
        #!/bin/sh
        exec /app/windows-app-for-linux/node_modules/electron/dist/electron \
          --no-sandbox /app/windows-app-for-linux/main.js "$@"
        EOF
      - chmod +x /app/bin/windows-app-for-linux
      - install -Dm644 src/windows-app-for-linux.desktop /app/share/applications/io.github.joshschools.WindowsAppForLinux.desktop
      - install -Dm644 src/windows-app-for-linux.desktop.512x512.png /app/share/icons/hicolor/512x512/apps/io.github.joshschools.WindowsAppForLinux.png
      - install -Dm644 src/windows-app-for-linux.desktop.256x256.png /app/share/icons/hicolor/256x256/apps/io.github.joshschools.WindowsAppForLinux.png
    sources:
      - type: dir
        path: ..
        skip:
          - .git
          - build
