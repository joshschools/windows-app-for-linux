app-id: com.microsoft.WindowsAppForLinux
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: windows-app-for-linux
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=x11
  - --socket=pulseaudio
  - --device=all
  - --share=network
  - --talk-name=org.freedesktop.Flatpak
  - --filesystem=home
  - --filesystem=xdg-documents
  - --filesystem=xdg-download

modules:
  - name: windows-app-for-linux
    buildsystem: simple
    build-commands:
      - |
        # Install Electron binary and supporting files
        install -d /app/lib/windows-app-for-linux
        cp -a node_modules/electron/dist/. /app/lib/windows-app-for-linux/
        chmod +x /app/lib/windows-app-for-linux/electron

        # Set up app source in Electron resources directory
        install -d /app/lib/windows-app-for-linux/resources/app/src
        install -Dm644 package.json /app/lib/windows-app-for-linux/resources/app/package.json
        install -Dm644 src/main.js /app/lib/windows-app-for-linux/resources/app/src/main.js

        # Create launcher script (--no-sandbox required inside Flatpak)
        mkdir -p /app/bin
        printf '#!/bin/sh\nexec /app/lib/windows-app-for-linux/electron --no-sandbox "$@"\n' \
          > /app/bin/windows-app-for-linux
        chmod +x /app/bin/windows-app-for-linux

        # Install desktop file named after the app ID
        install -Dm644 src/windows-app-for-linux.desktop \
          /app/share/applications/com.microsoft.WindowsAppForLinux.desktop
        sed -i 's|^Exec=.*|Exec=windows-app-for-linux|' \
          /app/share/applications/com.microsoft.WindowsAppForLinux.desktop
        sed -i 's|^Icon=.*|Icon=com.microsoft.WindowsAppForLinux|' \
          /app/share/applications/com.microsoft.WindowsAppForLinux.desktop

        # Install icons
        install -Dm644 src/windows-app-for-linux.desktop.512x512.png \
          /app/share/icons/hicolor/512x512/apps/com.microsoft.WindowsAppForLinux.png
        install -Dm644 src/windows-app-for-linux.desktop.256x256.png \
          /app/share/icons/hicolor/256x256/apps/com.microsoft.WindowsAppForLinux.png
    sources:
      - type: dir
        path: ..
